nfr:
  - id: NFR-PERF-01
    title: Slack ACK応答時間
    target: 3秒以内（必須）
  - id: NFR-PERF-02
    title: AI回答完了時間（テキスト）
    target: 15秒以内
  - id: NFR-SEC-01
    title: Slack署名検証
    target: 必須実装
  - id: NFR-SEC-02
    title: 生徒間データ越境防止
    target: channel_id→person_id解決の徹底

